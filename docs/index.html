<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Watch Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            color: white;
            font-size: 1.2em;
            font-weight: 600;
        }

        .connection-status {
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .connected { color: #2ecc71; }
        .disconnected { color: #e74c3c; }

        .main-content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .card-title {
            font-size: 1em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ecf0f1;
        }

        .big-value {
            text-align: center;
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .heart-rate-value { color: #e74c3c; }
        .spo2-value { color: #3498db; }

        .status-badge {
            text-align: center;
            padding: 6px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin: 8px 0;
        }

        .status-good { background: #d4edda; color: #155724; }
        .status-warning { background: #fff3cd; color: #856404; }
        .status-danger { background: #f8d7da; color: #721c24; }
        .status-normal { background: #e2e3e5; color: #383d41; }

        .chart-container {
            height: 150px;
            margin-top: 10px;
        }

        .control-group {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .control-group:last-child { margin-bottom: 0; }

        .control-label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }

        .mode-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }

        .mode-auto {
            background: #6c757d;
            color: white;
        }
        .mode-auto.active { background: #28a745; }

        .mode-manual {
            background: #fd7e14;
            color: white;
        }
        .mode-manual.active { background: #e8590c; }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-on { background: #28a745; color: white; }
        .btn-off { background: #dc3545; color: white; }

        .mode-text {
            font-size: 11px;
            color: #6c757d;
            text-align: center;
            margin-top: 8px;
        }

        .ai-status {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .ai-status-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .ai-status-value {
            font-size: 1.4em;
            font-weight: bold;
        }

        .ai-score {
            font-size: 11px;
            color: #6c757d;
            margin-top: 5px;
        }

        .log-section {
            background: white;
            border-radius: 16px;
            padding: 12px;
            max-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .log-header h3 { font-size: 0.9em; color: #2c3e50; }

        .btn-download {
            background: #3498db;
            color: white;
            padding: 5px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }

        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            border: 1px solid #ecf0f1;
            padding: 8px 10px;
            text-align: left;
        }

        th {
            background: #ecf0f1;
            color: #2c3e50;
            position: sticky;
            top: 0;
        }

        .no-finger-row {
            background-color: #fff3cd;
        }

        @media (max-width: 800px) {
            .main-content { gap: 8px; }
            .big-value { font-size: 1.8em; }
            th, td { padding: 5px 6px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HỆ THỐNG THEO DÕI VÒNG TAY THÔNG MINH</h1>
            <div class="connection-status">
                MQTT: <span id="mqtt-status" class="disconnected">Offline</span>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <div class="card-title">NHỊP TIM</div>
                <div class="big-value heart-rate-value" id="heart-rate">--</div>
                <div class="status-badge" id="finger-status">Đang chờ</div>
                <div class="chart-container">
                    <canvas id="hr-chart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-title">SpO2</div>
                <div class="big-value spo2-value" id="spo2">--</div>
                <div class="status-badge" id="spo2-status"></div>
                <div class="chart-container">
                    <canvas id="spo2-chart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-title">ĐIỀU KHIỂN</div>
                
                <div class="ai-status">
                    <div class="ai-status-label">PHÁT HIỆN</div>
                    <div class="ai-status-value" id="ai-status">Bình thường</div>
                    <div class="ai-score" id="fall-score"></div>
                </div>

                <div class="control-group">
                    <div class="control-label">CÒI BUZZER</div>
                    <div class="mode-buttons">
                        <button class="mode-btn mode-auto" id="buzzer-auto">TỰ ĐỘNG</button>
                        <button class="mode-btn mode-manual" id="buzzer-manual">THỦ CÔNG</button>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn btn-on" id="buzzer-on">BẬT CÒI</button>
                        <button class="action-btn btn-off" id="buzzer-off">TẮT CÒI</button>
                    </div>
                    <div class="mode-text" id="buzzer-mode-text">Chế độ: Tự động</div>
                </div>

                <div class="control-group">
                    <div class="control-label">ĐÈN LED</div>
                    <div class="mode-buttons">
                        <button class="mode-btn mode-auto" id="led-auto">TỰ ĐỘNG</button>
                        <button class="mode-btn mode-manual" id="led-manual">THỦ CÔNG</button>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn btn-on" id="led-on">BẬT ĐÈN</button>
                        <button class="action-btn btn-off" id="led-off">TẮT ĐÈN</button>
                    </div>
                    <div class="mode-text" id="led-mode-text">Chế độ: Tự động</div>
                </div>
            </div>
        </div>

        <div class="log-section">
            <div class="log-header">
                <h3>LOG DỮ LIỆU</h3>
                <button class="btn-download" onclick="downloadCSV()">XUẤT CSV</button>
            </div>
            <div class="table-wrapper">
                <table id="log-table">
                    <thead>
                        <tr><th>Thời gian</th><th>Nhịp tim</th><th>SpO2</th><th>Ngón tay</th><th>Trạng thái</th></thead>
                    <tbody id="log-body">
                        <tr><td colspan="5" style="text-align:center">Đang kết nối...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const mqttBroker = "wss://broker.emqx.io:8084/mqtt";
        let client = null;
        let hrChart, spo2Chart;
        let hrData = [], spo2Data = [];
        let logData = [];
        
        let buzzerMode = 'AUTO';
        let ledMode = 'AUTO';
        let currentFingerStatus = 'no_finger';
        let currentHeartRate = '--';
        let currentSpO2 = '--';
        let currentFallScore = 0;
        let currentFallStatus = 'normal';
        
        let lastLogTime = 0;
        let lastLogHeartRate = '';
        let lastLogSpO2 = '';
        let lastLogFinger = '';

        const TOPICS = {
            HEART_RATE: "smart_watch/heart_rate",
            SPO2: "smart_watch/spo2",
            FINGER_STATUS: "smart_watch/finger_status",
            FALL_STATUS: "smart_watch/fall_status",
            FALL_SCORE: "smart_watch/fall_score",
            BUZZER_CONTROL: "smart_watch/buzzer/control",
            LED_CONTROL: "smart_watch/led/control"
        };

        function initCharts() {
            const hrCtx = document.getElementById('hr-chart').getContext('2d');
            hrChart = new Chart(hrCtx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'BPM', data: [], borderColor: '#e74c3c', backgroundColor: 'rgba(231, 76, 60, 0.1)', borderWidth: 2, fill: true, tension: 0.3, pointRadius: 3 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { min: 40, max: 150 } } }
            });

            const spo2Ctx = document.getElementById('spo2-chart').getContext('2d');
            spo2Chart = new Chart(spo2Ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'SpO2', data: [], borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)', borderWidth: 2, fill: true, tension: 0.3, pointRadius: 3 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { min: 70, max: 100 } } }
            });
        }

        function updateCharts(hrValue, spo2Value) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            if (hrValue !== null && hrValue !== '--' && !isNaN(hrValue)) {
                hrData.push(hrValue);
                if (hrData.length > 15) hrData.shift();
                const hrLabels = hrChart.data.labels;
                hrLabels.push(timeStr);
                if (hrLabels.length > 15) hrLabels.shift();
                hrChart.data.labels = [...hrLabels];
                hrChart.data.datasets[0].data = [...hrData];
                hrChart.update('none');
            }
            
            if (spo2Value !== null && spo2Value !== '--' && !isNaN(spo2Value)) {
                spo2Data.push(spo2Value);
                if (spo2Data.length > 15) spo2Data.shift();
                const spo2Labels = spo2Chart.data.labels;
                spo2Labels.push(timeStr);
                if (spo2Labels.length > 15) spo2Labels.shift();
                spo2Chart.data.labels = [...spo2Labels];
                spo2Chart.data.datasets[0].data = [...spo2Data];
                spo2Chart.update('none');
            }
        }

        function updateUI() {
            document.getElementById('buzzer-mode-text').innerHTML = `Chế độ: ${buzzerMode === 'AUTO' ? 'Tự động' : 'Thủ công'}`;
            document.getElementById('led-mode-text').innerHTML = `Chế độ: ${ledMode === 'AUTO' ? 'Tự động' : 'Thủ công'}`;
            
            const buzzerAuto = document.getElementById('buzzer-auto');
            const buzzerManual = document.getElementById('buzzer-manual');
            buzzerAuto.classList.toggle('active', buzzerMode === 'AUTO');
            buzzerManual.classList.toggle('active', buzzerMode === 'MANUAL');
            
            const ledAuto = document.getElementById('led-auto');
            const ledManual = document.getElementById('led-manual');
            ledAuto.classList.toggle('active', ledMode === 'AUTO');
            ledManual.classList.toggle('active', ledMode === 'MANUAL');
            
            const isManual = buzzerMode === 'MANUAL';
            document.getElementById('buzzer-on').disabled = !isManual;
            document.getElementById('buzzer-off').disabled = !isManual;
        }

        // HÀM GỬI LỆNH MQTT
        function sendBuzzerCommand(cmd) {
            if (client && client.connected) {
                client.publish(TOPICS.BUZZER_CONTROL, cmd);
                console.log("Sent buzzer:", cmd);
                alert(`Đã gửi lệnh: ${cmd}`);
            } else {
                console.log("MQTT not connected");
                alert("Chưa kết nối MQTT!");
            }
        }

        function sendLEDCommand(cmd) {
            if (client && client.connected) {
                client.publish(TOPICS.LED_CONTROL, cmd);
                console.log("Sent LED:", cmd);
            }
        }

        function setBuzzerMode(mode) {
            buzzerMode = mode;
            sendBuzzerCommand(mode);
            updateUI();
        }

        function setLEDMode(mode) {
            ledMode = mode;
            sendLEDCommand(mode);
            updateUI();
        }

        function addLog() {
            const now = Date.now();
            if (now - lastLogTime < 1900) return;
            
            let fingerText = '';
            if (currentFingerStatus === 'detected') fingerText = 'Có ngón';
            else if (currentFingerStatus === 'stabilizing') fingerText = 'Đang ổn định';
            else fingerText = 'Không ngón';
            
            let hrDisplay = (currentHeartRate !== '--' && currentHeartRate !== 'invalid') ? currentHeartRate : '--';
            let spo2Display = (currentSpO2 !== '--' && currentSpO2 !== 'invalid') ? currentSpO2 : '--';
            
            let isChanged = (hrDisplay !== lastLogHeartRate || spo2Display !== lastLogSpO2 || fingerText !== lastLogFinger);
            if (!isChanged && fingerText !== 'Không ngón') return;
            
            lastLogTime = now;
            lastLogHeartRate = hrDisplay;
            lastLogSpO2 = spo2Display;
            lastLogFinger = fingerText;
            
            logData.unshift({
                time: new Date().toLocaleString('vi-VN'),
                heartRate: hrDisplay,
                spo2: spo2Display,
                fingerStatus: fingerText,
                fallStatus: currentFallStatus === 'fall' ? 'PHÁT HIỆN NGÃ' : 'Bình thường'
            });
            
            if (logData.length > 30) logData.pop();
            updateLogTable();
        }
        
        function updateLogTable() {
            const tbody = document.getElementById('log-body');
            if (logData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Chưa có dữ liệu</td></tr>';
                return;
            }
            tbody.innerHTML = logData.map(row => {
                let rowClass = (row.fingerStatus === 'Không ngón') ? 'class="no-finger-row"' : '';
                return `<tr ${rowClass}>
                    <td>${row.time}</td>
                    <td>${row.heartRate}</td>
                    <td>${row.spo2}</td>
                    <td>${row.fingerStatus}</td>
                    <td>${row.fallStatus}</td>
                </tr>`;
            }).join('');
        }

        function downloadCSV() {
            let csv = "Thời gian,Nhịp tim,SpO2,Ngón tay,Trạng thái\n";
            logData.forEach(row => {
                csv += `${row.time},${row.heartRate},${row.spo2},${row.fingerStatus},${row.fallStatus}\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `smartwatch_${Date.now()}.csv`;
            link.click();
        }

        function updateHeartRate(v) {
            if (v === 'invalid' || currentFingerStatus === 'no_finger') {
                currentHeartRate = '--';
                document.getElementById('heart-rate').innerHTML = '--';
            } else {
                currentHeartRate = v;
                document.getElementById('heart-rate').innerHTML = v;
                updateCharts(parseInt(v), null);
            }
            addLog();
        }

        function updateSpO2(v) {
            const statusEl = document.getElementById('spo2-status');
            if (v === 'invalid' || currentFingerStatus === 'no_finger') {
                currentSpO2 = '--';
                document.getElementById('spo2').innerHTML = '--';
                statusEl.innerHTML = 'Không đo được';
                statusEl.className = 'status-badge status-warning';
            } else {
                currentSpO2 = v;
                document.getElementById('spo2').innerHTML = v;
                updateCharts(null, parseInt(v));
                const val = parseInt(v);
                if (val < 92) {
                    statusEl.innerHTML = 'Cảnh báo thấp';
                    statusEl.className = 'status-badge status-danger';
                } else if (val < 95) {
                    statusEl.innerHTML = 'Thiếu oxy nhẹ';
                    statusEl.className = 'status-badge status-warning';
                } else {
                    statusEl.innerHTML = 'Bình thường';
                    statusEl.className = 'status-badge status-good';
                }
            }
            addLog();
        }

        function updateFinger(v) {
            const el = document.getElementById('finger-status');
            currentFingerStatus = v;
            if (v === 'no_finger') {
                el.innerHTML = 'Không có ngón tay';
                el.className = 'status-badge status-warning';
                document.getElementById('heart-rate').innerHTML = '--';
                document.getElementById('spo2').innerHTML = '--';
                currentHeartRate = '--';
                currentSpO2 = '--';
            } else if (v === 'stabilizing') {
                el.innerHTML = 'Đang ổn định... giữ yên tay';
                el.className = 'status-badge status-normal';
            } else {
                el.innerHTML = 'Đang đo';
                el.className = 'status-badge status-good';
            }
            addLog();
        }

        function updateAI(v, score) {
            currentFallStatus = v;
            currentFallScore = score;
            const el = document.getElementById('ai-status');
            const scoreEl = document.getElementById('fall-score');
            if (v === 'fall') {
                el.innerHTML = 'PHÁT HIỆN NGÃ';
                el.style.color = '#e74c3c';
                scoreEl.innerHTML = score > 0 ? `Độ chính xác: ${(score * 100).toFixed(1)}%` : '';
            } else {
                el.innerHTML = 'Bình thường';
                el.style.color = '#2c3e50';
                scoreEl.innerHTML = '';
            }
            addLog();
        }

        function connectMQTT() {
            client = mqtt.connect("wss://broker.emqx.io:8084/mqtt", {
                clientId: "web_" + Math.random().toString(16).substr(2, 8)
            });
            client.on('connect', () => {
                document.getElementById('mqtt-status').innerHTML = 'Online';
                document.getElementById('mqtt-status').className = 'connected';
                client.subscribe(TOPICS.HEART_RATE);
                client.subscribe(TOPICS.SPO2);
                client.subscribe(TOPICS.FINGER_STATUS);
                client.subscribe(TOPICS.FALL_STATUS);
                client.subscribe(TOPICS.FALL_SCORE);
                console.log("MQTT Connected");
            });
            client.on('error', (err) => {
                console.error("MQTT Error:", err);
                document.getElementById('mqtt-status').innerHTML = 'Offline';
                document.getElementById('mqtt-status').className = 'disconnected';
            });
            client.on('message', (topic, msg) => {
                const val = msg.toString();
                switch(topic) {
                    case TOPICS.HEART_RATE: updateHeartRate(val); break;
                    case TOPICS.SPO2: updateSpO2(val); break;
                    case TOPICS.FINGER_STATUS: updateFinger(val); break;
                    case TOPICS.FALL_STATUS: updateAI(val, currentFallScore); break;
                    case TOPICS.FALL_SCORE: currentFallScore = parseFloat(val); updateAI(currentFallStatus, currentFallScore); break;
                }
            });
        }

        // GÁN SỰ KIỆN CLICK - QUAN TRỌNG
        document.addEventListener('DOMContentLoaded', function() {
            // Buzzer events
            document.getElementById('buzzer-auto').onclick = () => setBuzzerMode('AUTO');
            document.getElementById('buzzer-manual').onclick = () => setBuzzerMode('MANUAL');
            document.getElementById('buzzer-on').onclick = () => sendBuzzerCommand('ON');
            document.getElementById('buzzer-off').onclick = () => sendBuzzerCommand('OFF');
            
            // LED events
            document.getElementById('led-auto').onclick = () => setLEDMode('AUTO');
            document.getElementById('led-manual').onclick = () => setLEDMode('MANUAL');
            document.getElementById('led-on').onclick = () => sendLEDCommand('ON');
            document.getElementById('led-off').onclick = () => sendLEDCommand('OFF');
            
            console.log("Event listeners attached");
        });

        // Khởi tạo
        initCharts();
        connectMQTT();
        updateUI();
    </script>
</body>
</html>
